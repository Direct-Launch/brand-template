name: Validate brand repository

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate
        # Drop --strict while the repo is still being filled in; add it back
        # once the client is live so placeholders can never ship.
        run: node scripts/validate-brand.mjs
